<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WypiekaMY — wypiekamy z miłością każdego dnia.">
  <title>WypiekaMY</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=plein@401&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      '#ffebef',
            primary: '#8e1500',
            accent:  '#e88a92',
          },
          fontFamily: {
            sans: ['Plein', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; color: #8e1500; }
    html { scrollbar-color: #e88a92 #ffebef; }
    body {
      font-family: 'Plein', sans-serif;
      background-color: #ffebef;
      background-image:
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 38px,
          rgba(255,255,255,0.15) 38px,
          rgba(255,255,255,0.15) 40px
        ),
        repeating-linear-gradient(
          180deg,
          transparent,
          transparent 58px,
          rgba(255,255,255,0.15) 58px,
          rgba(255,255,255,0.15) 60px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(198,110,130,0.07) 0px,
          rgba(220,140,155,0.05) 10px,
          rgba(232,138,146,0.08) 20px,
          rgba(180,90,108,0.06) 30px,
          rgba(198,110,130,0.06) 40px
        ),
        linear-gradient(
          to right,
          rgba(210,90,120,0.28) 0%,
          transparent 22%,
          transparent 78%,
          rgba(210,90,120,0.28) 100%
        );
      font-size: 16px;
      line-height: 1.5;
    }
    ::-webkit-scrollbar       { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #ffebef; }
    ::-webkit-scrollbar-thumb { background: #e88a92; border-radius: 3px; }

    /* category tabs */
    .cat-btn { font-family: 'Plein', sans-serif; background: none; border: none; border-bottom: 2.5px solid transparent; cursor: pointer; padding: 18px 20px; white-space: nowrap; font-size: 14px; font-weight: 500; color: #8e1500; display: flex; align-items: center; gap: 7px; transition: opacity 0.15s; }
    .cat-btn:hover { opacity: 0.65; }
    .cat-btn.active { border-bottom: 2.5px solid #8e1500; font-weight: 700; }

    /* hide scrollbar for categories strip */
    .cat-strip { overflow-x: auto; scrollbar-width: none; }
    .cat-strip::-webkit-scrollbar { display: none; }

    /* product card */
    .card { cursor: pointer; }
    .card-img-wrap { position: relative; overflow: hidden; border-radius: 14px; }
    .card-img-wrap img { width: 100%; aspect-ratio: 4 / 5; object-fit: cover; display: block; transition: transform 0.35s ease; border-radius: 14px; }
    .card:hover .card-img-wrap img { transform: scale(1.04); }

    /* heart button */
    .card-name, #modal-name { font-family: 'Nunito', sans-serif; }

    .heart-btn { position: absolute; bottom: 8px; right: 8px; width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.88); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 6px rgba(142,21,0,0.12); transition: transform 0.15s; backdrop-filter: blur(4px); }
    .heart-btn:hover { transform: scale(1.12); }
    .heart-btn svg { width: 15px; height: 15px; transition: fill 0.15s; fill: none; }
    .heart-btn.liked svg { fill: #8e1500; }

    /* price badge on image */
    .price-badge { position: absolute; bottom: 8px; right: 48px; font-family: 'Plein', sans-serif; font-size: 11.5px; font-weight: 700; color: #8e1500; background: rgba(255,255,255,0.88); border-radius: 100px; padding: 2px 8px; white-space: nowrap; box-shadow: 0 1px 5px rgba(142,21,0,0.1); backdrop-filter: blur(4px); }

    /* search input */
    .search-input { font-family: 'Plein', sans-serif; background: transparent; color: #8e1500; border: 1px solid rgba(232,138,146,0.45); border-radius: 100px; padding: 7px 14px 7px 34px; font-size: 12.5px; width: 196px; outline: none; transition: border-color 0.2s; }
    .search-input::placeholder { color: rgba(142,21,0,0.38); }
    .search-input:focus { border-color: rgba(232,138,146,0.9); }

    /* icon button base */
    .icon-btn { padding: 8px; border-radius: 10px; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .icon-btn:hover { background: rgba(232,138,146,0.18); }

    /* ── PRODUCT MODAL ── */
    #prod-backdrop { position:fixed; inset:0; background:rgba(142,21,0,0.14); z-index:150; opacity:0; pointer-events:none; transition:opacity 0.28s ease; }
    #prod-backdrop.open { opacity:1; pointer-events:all; }
    #prod-modal { position:fixed; top:0; right:0; height:100%; width:min(860px,100%); background:#ffebef; z-index:151; transform:translateX(100%); transition:transform 0.36s cubic-bezier(0.4,0,0.2,1); overflow-y:auto; box-shadow:-6px 0 48px rgba(142,21,0,0.1); display:flex; flex-direction:column; }
    #prod-modal.open { transform:translateX(0); }
    .modal-topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid rgba(232,138,146,0.2); position:sticky; top:0; background:#ffebef; z-index:1; }
    .modal-close-btn { width:34px; height:34px; border-radius:8px; background:none; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s; flex-shrink:0; }
    .modal-close-btn:hover { background:rgba(232,138,146,0.2); }
    .modal-content { display:grid; grid-template-columns:1fr 1fr; gap:0; flex:1; }
    @media(max-width:640px){ .modal-content{grid-template-columns:1fr;} }
    .modal-img-col { padding:24px; }
    .modal-img-col img { width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:16px; display:block; }
    .modal-detail-col { padding:24px 28px; display:flex; flex-direction:column; gap:14px; }
    .modal-add-btn { display:flex; align-items:center; justify-content:center; gap:10px; background:#8e1500; color:#ffebef; border:none; border-radius:100px; padding:14px 28px; font-family:'Plein',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:background 0.18s,transform 0.1s; width:100%; margin-top:auto; }
    .modal-add-btn:hover { background:#a31800; }
    .modal-add-btn:active { transform:scale(0.97); }

    /* ── DRAWER ── */
    #drawer-backdrop { position: fixed; inset: 0; background: rgba(142,21,0,0.12); z-index: 90; opacity: 0; pointer-events: none; transition: opacity 0.28s ease; }
    #drawer-backdrop.open { opacity: 1; pointer-events: all; }
    #drawer { position: fixed; top: 0; left: 0; height: 100%; width: 290px; background: #ffebef; z-index: 100; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; box-shadow: 4px 0 32px rgba(142,21,0,0.1); }
    #drawer.open { transform: translateX(0); }
    .drawer-link { font-family: 'Plein', sans-serif; font-size: 14.5px; font-weight: 500; color: #8e1500; background: none; border: none; cursor: pointer; text-align: left; padding: 11px 24px; display: flex; align-items: center; justify-content: space-between; gap: 8px; text-decoration: none; transition: background 0.15s; }
    .drawer-link:hover { background: rgba(232,138,146,0.15); }
    .drawer-divider { height: 1px; background: rgba(232,138,146,0.3); margin: 6px 24px; }
    .drawer-search { font-family: 'Plein', sans-serif; background: transparent; color: #8e1500; border: 1px solid rgba(232,138,146,0.45); border-radius: 100px; padding: 8px 14px 8px 36px; font-size: 13px; width: 100%; outline: none; transition: border-color 0.2s; }
    .drawer-search::placeholder { color: rgba(142,21,0,0.38); }
    .drawer-search:focus { border-color: rgba(232,138,146,0.85); }
    .lang-btn { font-family: 'Plein', sans-serif; font-size: 13px; font-weight: 500; color: rgba(142,21,0,0.5); background: none; border: none; cursor: pointer; padding: 2px 0; }
    .lang-btn.active { color: #8e1500; border-bottom: 1.5px solid #8e1500; font-weight: 700; }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.45} }
  </style>
</head>

  <!-- =========================================================
       JS
  ========================================================= -->
  <script>
    /* ── SANITY CONFIG ── */
    const SANITY_PROJECT_ID  = 'pffx13ss';
    const SANITY_DATASET     = 'production';
    const SANITY_CDN = `https://${SANITY_PROJECT_ID}.api.sanity.io/v2024-01-01/data/query/${SANITY_DATASET}`;

    let products   = [];
    let categories = [];
    let currentCat = 'all';

    function sanityImageUrl(ref, width) {
      const withoutPrefix = ref.replace(/^image-/, '');
      const filename = withoutPrefix.replace(/-([a-z]+)$/, '.$1');
      const base = `https://cdn.sanity.io/images/${SANITY_PROJECT_ID}/${SANITY_DATASET}/${filename}`;
      return width ? `${base}?w=${width}&auto=format&fit=crop` : base;
    }

    function getCatLabel(cat) {
      if (!cat) return '';
      const name = (currentLang === 'en' && cat.name_en) ? cat.name_en : cat.name_pl;
      return cat.emoji ? `${cat.emoji} ${name}` : name;
    }

    function renderCatTabs() {
      const allLabel = currentLang === 'en' ? 'All' : 'Wszystkie';
      const strip = document.getElementById('cat-buttons');
      strip.innerHTML =
        `<button class="cat-btn${currentCat === 'all' ? ' active' : ''}" onclick="filterCat(this,'all')">✨ ${allLabel}</button>` +
        categories.map(c => {
          const label = (currentLang === 'en' && c.name_en) ? c.name_en : c.name_pl;
          const emoji = c.emoji ? c.emoji + ' ' : '';
          return `<button class="cat-btn${currentCat === c._id ? ' active' : ''}" onclick="filterCat(this,'${c._id}')">${emoji}${label}</button>`;
        }).join('') +
        `<span style="display:flex;align-items:center;padding:0 10px;color:#e88a92;font-size:18px;flex-shrink:0;user-select:none;">›</span>`;
    }

    /* ── FETCH FROM SANITY ── */
    async function loadCategories() {
      const query = encodeURIComponent(`*[_type=="category"]|order(name_pl asc){_id,name_pl,name_en,emoji}`);
      const res  = await fetch(`${SANITY_CDN}?query=${query}`);
      const json = await res.json();
      categories = json.result || [];
      renderCatTabs();
    }

    async function loadProducts() {
      showSkeleton(true);
      const query = encodeURIComponent(
        `*[_type=="product"]{_id,name_pl,name_en,price,"category":category->{_id,name_pl,name_en,emoji},"imageRef":image.asset._ref,desc_pl,desc_en,available}`
      );
      try {
        const res  = await fetch(`${SANITY_CDN}?query=${query}`);
        const json = await res.json();
        products = json.result || [];
        renderGrid(products);
      } catch(err) {
        console.error('Sanity fetch failed:', err);
        document.getElementById('product-grid').innerHTML =
          '<p style="opacity:0.4;font-size:14px;padding:32px 0;">Nie można załadować produktów. Odśwież stronę.</p>';
      } finally {
        showSkeleton(false);
      }
    }

    function showSkeleton(show) {
      const sk = document.getElementById('loading-skeleton');
      const gr = document.getElementById('product-grid');
      if (show) {
        if (!sk.children.length) {
          sk.innerHTML = Array.from({length:8}, () => `
            <div>
              <div style="border-radius:14px;background:rgba(232,138,146,0.15);aspect-ratio:5/6;animation:shimmer 1.4s ease-in-out infinite;"></div>
              <div style="height:13px;margin:10px 4px 6px;border-radius:6px;background:rgba(232,138,146,0.15);animation:shimmer 1.4s ease-in-out infinite;"></div>
              <div style="height:13px;width:40%;margin:0 4px;border-radius:6px;background:rgba(232,138,146,0.12);animation:shimmer 1.4s ease-in-out infinite;"></div>
            </div>`).join('');
        }
        sk.style.display = 'grid';
        gr.style.display = 'none';
      } else {
        sk.style.display = 'none';
        gr.style.display = 'grid';
      }
    }

    function renderGrid(items) {
      const grid     = document.getElementById('product-grid');
      const lang     = currentLang;
      const filtered = currentCat === 'all' ? items : items.filter(p => p.category?._id === currentCat);

      grid.innerHTML = filtered.map(p => {
        const name = lang === 'en' ? p.name_en : p.name_pl;
        const imgSrc = p.imageRef ? sanityImageUrl(p.imageRef, 400) : '';
        return `
          <div class="card" data-cat="${p.category}" data-id="${p._id}" onclick="openProduct('${p._id}')">
            <div class="card-img-wrap">
              <img src="${imgSrc}" alt="${name}" loading="lazy">
              <span class="price-badge" style="display:none;">${p.price} zł</span>
              <button class="heart-btn" onclick="event.stopPropagation();toggleHeart(this)" aria-label="Ulubione">
                <svg viewBox="0 0 24 24" stroke="#8e1500" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
              </button>
            </div>
            <div style="padding:12px 2px 16px;">
              <p class="card-name" style="font-size:14.5px;font-weight:600;line-height:1.4;">${name}</p>
              <p style="font-size:14px;font-weight:700;margin-top:4px;">${p.price} zł</p>
            </div>
          </div>`;
      }).join('');

      document.getElementById('empty-state').style.display = filtered.length === 0 ? 'block' : 'none';
    }

    /* ── TRANSLATIONS ── */
    const translations = {
      pl: {
        search:       'Szukaj produktów',
        nav_bakery:   'Cukiernia',
        nav_contact:  'Kontakt',
        nav_cafe:     'WypiekaMY Kawiarnia',
        nav_terms:    'Regulamin cukierni',
        nav_about:    'O nas',
        cat_all:      '✨ Wszystkie',
        cat_paczki:   '🍩 Pączki',
        cat_ciasta:   '🥐 Ciasta',
        cat_torty:    '🎂 Torty',
        cat_serniki:  '🍰 Serniki',
        cat_pufy:     '☁️ Pufy (pt–nd)',
        cat_czekolada:'🍫 Czekolada',
        cat_cukierki: '🍬 Cukierki',
        cat_zestawy:  '🎁 Zestawy',
        cart:         'Koszyk',
        modal_fresh:  'Najlepsze na świeżo.',
        modal_total:  'Łącznie:',
        modal_add:    'Dodaj do koszyka',
        modal_avail:  'Dostępne:',
        modal_pieces: 'sztuk',
        no_products:  'Brak produktów w tej kategorii.',
      },
      en: {
        search:       'Search products',
        nav_bakery:   'Bakery',
        nav_contact:  'Contact',
        nav_cafe:     'WypiekaMY Café',
        nav_terms:    'Terms & Conditions',
        nav_about:    'About us',
        cat_all:      '✨ All',
        cat_paczki:   '🍩 Doughnuts',
        cat_ciasta:   '🥐 Pastries',
        cat_torty:    '🎂 Cakes',
        cat_serniki:  '🍰 Cheesecakes',
        cat_pufy:     '☁️ Puffs (Fri–Sun)',
        cat_czekolada:'🍫 Chocolate',
        cat_cukierki: '🍬 Sweets',
        cat_zestawy:  '🎁 Gift Sets',
        cart:         'Cart',
        modal_fresh:  'Best enjoyed fresh.',
        modal_total:  'Total:',
        modal_add:    'Add to cart',
        modal_avail:  'Available:',
        modal_pieces: 'pieces',
        no_products:  'No products in this category.',
      }
    };

    let currentLang = localStorage.getItem('wypiekamy_lang') || 'pl';

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('wypiekamy_lang', lang);
      document.documentElement.lang = lang === 'en' ? 'en' : 'pl';
      const t = translations[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (t[key] !== undefined) el.textContent = t[key];
      });
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const key = el.dataset.i18nPh;
        if (t[key] !== undefined) el.placeholder = t[key];
      });
      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === lang);
      });
      renderCatTabs();
      if (products.length) renderGrid(products);
    }

    function toggleHeart(btn) {
      event.stopPropagation();
      btn.classList.toggle('liked');
    }

    function filterCat(btn, cat) {
      currentCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid(products);
    }

    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('drawer-backdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('drawer-backdrop').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeDrawer(); closeProduct(); }
    });

    function openProduct(id) {
      const p = products.find(x => x._id === id);
      if (!p) return;
      const lang = currentLang;
      const t    = translations[lang];
      const name = lang === 'en' ? p.name_en : p.name_pl;
      const cat  = getCatLabel(p.category);
      const desc = lang === 'en' ? p.desc_en : p.desc_pl;

      document.getElementById('modal-breadcrumb').textContent = cat + ' › ' + name;
      document.getElementById('modal-img').src                = p.imageRef ? sanityImageUrl(p.imageRef, 860) : '';
      document.getElementById('modal-img').alt                = name;
      document.getElementById('modal-cat').textContent        = cat;
      document.getElementById('modal-name').textContent       = name;
      document.getElementById('modal-available').textContent  = t.modal_avail + ' ' + p.available + ' ' + t.modal_pieces;
      document.getElementById('modal-desc').textContent       = desc;
      document.getElementById('modal-price').textContent      = p.price + ' zł';
      document.getElementById('modal-heart').classList.remove('liked');
      document.getElementById('prod-modal').classList.add('open');
      document.getElementById('prod-backdrop').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeProduct() {
      document.getElementById('prod-modal').classList.remove('open');
      document.getElementById('prod-backdrop').classList.remove('open');
      document.body.style.overflow = '';
    }

    /* ── BOOT ── */
    if (currentLang === 'en') {
      document.documentElement.lang = 'en';
      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === 'en');
      });
    }
    loadCategories();
    loadProducts();
  </script>

</body>
</html>
